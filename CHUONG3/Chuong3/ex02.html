<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quê hương</title>
</head>
<body>
    <h1 style="text-align:center;">QUÊ HƯƠNG</h1>

    <p>
        Quê hương là chùm khế ngọt <br>
        Cho con trèo hái mỗi ngày <br>
        Quê hương là con diều biết <br>
        Tuổi thơ con thả trên đồng <br>
    </p>

    <p>
        Quê hương là cầu tre nhỏ <br>
        Mẹ về nón lá nghiêng che <br>
        Quê hương mỗi người chỉ một <br>
        Như là chỉ một mẹ thôi <br>
    </p>
</body>
</html>
