<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Đổi màu nền</title>
  </head>
  <body>
    <h2>Chọn màu nền</h2>

    <!-- 3 nút -->
    <button onclick="doiMau('blue')">Màu xanh dương</button>
    <button onclick="doiMau('green')">Màu xanh lá</button>
    <button onclick="doiMau('yellow')">Màu vàng</button>

    <script>
      function doiMau(mau) {
        document.body.style.backgroundColor = mau;
      }
    </script>
  </body>
</html>
