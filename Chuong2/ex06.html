<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bảng tiền thưởng và công thức</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        table { border-collapse: collapse; width: 300px; }
        th, td { border: 1px solid #000; padding: 5px; }
        th { background: #C0C0C0; }
        td { text-align: right; }
        h3 { margin-top: 20px; }
    </style>
</head>
<body>

    <h3>BẢNG TIỀN THƯỞNG</h3>
    <table>
        <tr>
            <th>Loại</th>
            <th>Tiền thưởng</th>
        </tr>
        <tr><td>Giỏi</td><td>300000</td></tr>
        <tr><td>Khá</td><td>100000</td></tr>
        <tr><td>TB</td><td>50000</td></tr>
        <tr><td>Yếu</td><td>0</td></tr>
    </table>

    <h3>CÔNG THỨC</h3>
    <p>
        H<sub>2</sub>O &nbsp;&nbsp;
        O<sup>0</sup>C &nbsp;&nbsp;
        H<sub>2</sub>SO<sub>4</sub> &nbsp;&nbsp;
        A<sup>2</sup> + B<sup>2</sup>
    </p>
    <p>
        (A+B)<sup>3</sup> &nbsp;&nbsp;
        NH<sub>3</sub>
    </p>

</body>
</html>
